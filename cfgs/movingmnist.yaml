# Shared Base Configurations for V-WARP
dataset: "MovingMnist"
data_path: "./data"
seed: 2026
debug: false

# Architecture Base (Inherited across all phases)
root_activation: "relu"
root_width: 12
root_depth: 5
num_fourier_freqs: 5
use_time_in_root: false
cnn_hidden_width: 64
cnn_depth: 4
lam_space: 4
mem_space: 256
split_forward: true
discrete_actions: false
num_actions: 5
use_action_residuals: true

# ==========================================
# Phase 1: Autoencoder Pretraining
# ==========================================
phase_1:
  nb_epochs: 500
  print_every: 10
  batch_size: 128
  learning_rate: 1.0e-5
  encoder_sees_test: False
  mse_weight: 0.16
  # Phase 1 LR Scheduler
  lr_patience: 500
  lr_factor: 0.5
  lr_cooldown: 20
  lr_rtol: 1.0e-4
  lr_accum_size: 5
  lr_min_scale: 1.0e-0

# ==========================================
# Phase 2: Dynamics Fitting (IDM + FDM)
# ==========================================
phase_2:
  nb_epochs: 2000
  print_every: 10
  batch_size: 256
  learning_rate: 1.0e-4
  loss_type: "latent"  # Options: "latent" or "pixel"
  train_encoder: false  # Whether to allow gradients to flow into the encoder
  mse_weight: 0.16     # Only used if loss_type is "pixel"
  # Phase 2 Augmentations
  reverse_video_aug: true
  static_video_aug: true
  # Phase 2 LR Scheduler
  lr_patience: 500
  lr_factor: 0.5
  lr_cooldown: 100
  lr_rtol: 1.0e-4
  lr_accum_size: 5
  lr_min_scale: 1.0e-0

# ==========================================
# Phase 3: Generative Control (GCM)
# ==========================================
phase_3:
  nb_epochs: 2000
  print_every: 10
  batch_size: 256
  learning_rate: 1.0e-4
  loss_type: "L2"      # Options: "L1" or "L2"
  # Phase 3 LR Scheduler
  lr_patience: 300
  lr_factor: 0.5
  lr_cooldown: 100
  lr_rtol: 1.0e-4
  lr_accum_size: 5
  lr_min_scale: 1.0e-0
