cnn_depth: 4
cnn_hidden_width: 32
data_path: ./data
dataset: MiniGrid
debug: false
discrete_actions: true
lam_space: 3
mem_space: 256
num_fourier_freqs: 6
phase_1:
  batch_size: 16
  encoder_sees_test: false
  learning_rate: 1.0e-05
  lr_accum_size: 5
  lr_cooldown: 20
  lr_factor: 0.5
  lr_min_scale: 1.0
  lr_patience: 500
  lr_rtol: 0.0001
  mse_weight: 0.16
  nb_epochs: 100
  print_every: 10
phase_2:
  batch_size: 16
  learning_rate: 1.0e-05
  loss_type: latent
  lr_accum_size: 5
  lr_cooldown: 100
  lr_factor: 0.5
  lr_min_scale: 1.0
  lr_patience: 500
  lr_rtol: 0.0001
  mse_weight: 0.16
  nb_epochs: 2500
  print_every: 10
  num_actions: 200
  reverse_video_aug: true
  static_video_aug: true
  train_encoder: false
phase_3:
  batch_size: 128
  learning_rate: 1.0e-05
  loss_type: L2
  lr_accum_size: 5
  lr_cooldown: 100
  lr_factor: 0.5
  lr_min_scale: 1.0
  lr_patience: 500
  lr_rtol: 0.0001
  nb_epochs: 5000
  print_every: 10
  num_actions: 200
root_activation: relu
root_depth: 5
root_width: 12
seed: 42
split_forward: true
use_action_residuals: false
use_time_in_root: false
