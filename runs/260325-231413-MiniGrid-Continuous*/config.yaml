cnn_depth: 4
cnn_hidden_width: 32
data_path: ../../data
dataset: MiniGrid
debug: false
discrete_actions: false
lam_space: 4
mem_space: 256
num_actions: 64
num_fourier_freqs: 6
phase_1:
  batch_size: 16
  encoder_sees_test: false
  learning_rate: 1.0e-05
  lr_accum_size: 5
  lr_cooldown: 20
  lr_factor: 0.5
  lr_min_scale: 1.0
  lr_patience: 500
  lr_rtol: 0.0001
  mse_weight: 1.0
  nb_epochs: 1000
  print_every: 10
phase_2:
  batch_size: 24
  learning_rate: 1.0e-05
  loss_type: latent
  lr_accum_size: 5
  lr_cooldown: 100
  lr_factor: 0.5
  lr_min_scale: 1.0
  lr_patience: 500
  lr_rtol: 0.0001
  mse_weight: 0.16
  nb_epochs: 8000
  num_actions: 64
  print_every: 10
  reverse_video_aug: true
  static_video_aug: true
  train_encoder: false
phase_3:
  batch_size: 24
  gcm_type: transformer
  learning_rate: 1.0e-05
  loss_type: L2
  lr_accum_size: 5
  lr_cooldown: 100
  lr_factor: 0.5
  lr_min_scale: 1.0
  lr_patience: 500
  lr_rtol: 0.0001
  nb_epochs: 6000
  num_actions: 200
  print_every: 100
phase_4:
  batch_size: 16
  learning_rate: 1.0e-05
  loss_type: L2
  lr_accum_size: 5
  lr_cooldown: 100
  lr_factor: 0.5
  lr_min_scale: 1.0
  lr_patience: 500
  lr_rtol: 0.0001
  nb_epochs: 10000
  num_actions: 4
  # action_embedding_dim: 128 ## Used to be this much
  action_embedding_dim: 128
  print_every: 10
phase_5:
  batch_size: 16
  learning_rate: 1.0e-05
  loss_type: L2
  lr_accum_size: 5
  lr_cooldown: 100
  lr_factor: 0.5
  lr_min_scale: 1.0
  lr_patience: 500
  lr_rtol: 0.0001
  nb_epochs: 200
  num_actions: 4
  action_embedding_dim: 128
  print_every: 10
root_activation: relu
root_depth: 5
root_width: 12
seed: 42
split_forward: true
use_action_residuals: false
use_time_in_root: false
